<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nourish" />
  <meta name="theme-color" content="#0A0E16" />
  <title>Nourish</title>
  <style>* { box-sizing: border-box; }
body { margin: 0; background: #0A0E16; }
.ns-app {
  --bg:#0A0E16; --surf:#141A26; --surf2:#1B2230; --line:#28303F;
  --text:#EEF2F8; --dim:#7E8AA0;
  max-width:480px; margin:0 auto; min-height:100vh; position:relative;
  background:radial-gradient(120% 60% at 50% -10%, #131B2B 0%, #0A0E16 55%);
  color:var(--text); padding-bottom:86px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.ns-app button { font-family:inherit; cursor:pointer; color:inherit; }
.ns-dim { color:var(--dim); font-weight:500; }
.ns-fade { animation:nsFade .35s ease both; }
@keyframes nsFade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.ns-top { position:sticky; top:0; z-index:30; display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px 12px; background:linear-gradient(#0A0E16ee,#0A0E16cc); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line); }
.ns-top-title { font-size:21px; font-weight:800; letter-spacing:-0.02em; }
.ns-top-date { font-size:12.5px; color:var(--dim); margin-top:1px; font-weight:600; }
.ns-iconbtn { background:var(--surf); border:1px solid var(--line); width:38px; height:38px; border-radius:12px;
  display:grid; place-items:center; color:var(--dim); transition:transform .15s; }
.ns-iconbtn:active { transform:scale(.92); }
.ns-main { padding:16px 16px 8px; }
.ns-banner { width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px;
  background:linear-gradient(90deg,#1a2233,#161d2b); border:1px solid #2c3a55;
  border-radius:14px; padding:13px 15px; font-size:13.5px; font-weight:600; color:var(--text); margin-bottom:16px; }
.ns-fuel { display:flex; justify-content:center; padding:6px 0 4px; }
.ns-ring { position:relative; display:inline-flex; align-items:center; justify-content:center; }
.ns-ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.ns-cal-num { font-size:38px; font-weight:800; letter-spacing:-0.03em; line-height:1;
  font-family:ui-monospace,"SF Mono",Menlo,monospace; }
.ns-cal-sub { font-size:12.5px; color:var(--dim); margin-top:4px; font-weight:600; }
.ns-cal-tag { margin-top:7px; font-size:10.5px; font-weight:700; color:#FF4D8D; display:inline-flex; align-items:center; gap:3px;
  background:rgba(255,77,141,.12); padding:3px 9px; border-radius:20px; }
.ns-macros { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin:14px 0 4px; }
.ns-macro { display:flex; flex-direction:column; align-items:center; gap:5px; }
.ns-macro-pct { font-size:14px; font-weight:800; font-family:ui-monospace,monospace; }
.ns-macro-label { font-size:11px; color:var(--dim); font-weight:700; }
.ns-macro-val { font-size:11px; font-weight:700; font-family:ui-monospace,monospace; }
.ns-section-label { display:flex; align-items:center; gap:7px; font-size:12px; font-weight:800; letter-spacing:0.04em;
  text-transform:uppercase; color:var(--dim); margin:24px 2px 12px; }
.ns-missgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.ns-misscard { background:var(--surf); border:1px solid var(--line); border-radius:15px; padding:13px; text-align:left; transition:transform .15s; }
.ns-misscard:active { transform:scale(.97); }
.ns-miss-top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:9px; }
.ns-miss-name { font-size:13.5px; font-weight:800; }
.ns-miss-pct { font-size:13px; font-weight:800; font-family:ui-monospace,monospace; color:var(--text); }
.ns-miss-fix { font-size:11px; color:var(--dim); font-weight:700; display:flex; align-items:center; gap:2px; margin-top:9px; }
.ns-allgood { background:#12241d; border:1px solid #1f4a3a; border-radius:15px; padding:16px; font-size:13.5px; font-weight:600; color:#7CE38B; text-align:center; }
.ns-bartrack { height:7px; background:#222B3A; border-radius:20px; overflow:hidden; }
.ns-bartrack.sm { height:6px; }
.ns-barfill { height:100%; border-radius:20px; transition:width .9s cubic-bezier(.2,.8,.2,1); }
.ns-bars { display:flex; flex-direction:column; gap:13px; }
.ns-barrow { background:none; border:none; padding:0; text-align:left; width:100%; }
.ns-bartop { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px; }
.ns-barname { font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:8px; }
.ns-barnum { font-size:12.5px; font-weight:700; font-family:ui-monospace,monospace; }
.ns-dot { width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0; }
.ns-water { background:var(--surf); border:1px solid var(--line); border-radius:16px; padding:15px; margin-top:22px; }
.ns-water-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.ns-water-title { font-size:14px; font-weight:800; display:flex; align-items:center; gap:7px; }
.ns-water-count { font-size:14px; font-weight:800; font-family:ui-monospace,monospace; }
.ns-drops { display:flex; gap:4px; justify-content:space-between; }
.ns-drop { background:none; border:none; padding:4px; flex:1; display:grid; place-items:center; transition:transform .12s; }
.ns-drop:active { transform:scale(.8); }
.ns-meals { display:flex; flex-direction:column; gap:12px; }
.ns-meal { background:var(--surf); border:1px solid var(--line); border-radius:16px; padding:13px 14px; }
.ns-meal-head { display:flex; align-items:center; justify-content:space-between; }
.ns-meal-title { font-size:14.5px; font-weight:800; }
.ns-add-mini { background:var(--surf2); border:1px solid var(--line); width:30px; height:30px; border-radius:10px; display:grid; place-items:center; color:#2CE6C0; transition:transform .15s; }
.ns-add-mini:active { transform:scale(.88); }
.ns-meal-empty { width:100%; background:none; border:1px dashed var(--line); border-radius:11px; padding:11px; margin-top:10px;
  font-size:12.5px; color:var(--dim); font-weight:600; }
.ns-food { display:flex; align-items:center; gap:11px; padding:9px 0; border-top:1px solid var(--line); margin-top:9px; }
.ns-food-emoji { font-size:24px; width:30px; text-align:center; flex-shrink:0; }
.ns-food-mid { flex:1; min-width:0; }
.ns-food-name { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ns-food-sub { font-size:11.5px; color:var(--dim); font-weight:600; margin-top:1px; }
.ns-step { display:flex; align-items:center; gap:2px; background:var(--surf2); border:1px solid var(--line); border-radius:10px; padding:2px; }
.ns-step button { width:24px; height:24px; border:none; background:none; border-radius:7px; display:grid; place-items:center; color:var(--text); }
.ns-step button:active { background:var(--line); }
.ns-step span { font-size:12.5px; font-weight:800; min-width:22px; text-align:center; font-family:ui-monospace,monospace; }
.ns-trash { background:none; border:none; color:rgba(84,96,114,.35); padding:6px; display:grid; place-items:center; }
.ns-trash:active { color:#FF6B6B; }
.ns-week { display:flex; gap:6px; margin-bottom:6px; }
.ns-day { flex:1; background:var(--surf); border:1px solid var(--line); border-radius:14px; padding:10px 0 8px;
  display:flex; flex-direction:column; align-items:center; gap:4px; transition:transform .15s; }
.ns-day:active { transform:scale(.95); }
.ns-day-wd { font-size:10.5px; color:var(--dim); font-weight:700; }
.ns-day-num { font-size:16px; font-weight:800; font-family:ui-monospace,monospace; }
.ns-day-dot { width:5px; height:5px; border-radius:50%; background:#2CE6C0; transition:opacity .2s; }
.ns-day.active { background:linear-gradient(160deg,#FF4D8D,#d63a73); border-color:#FF4D8D; }
.ns-day.active .ns-day-wd, .ns-day.active .ns-day-num { color:#fff; }
.ns-day.active .ns-day-dot { background:#fff; }
.ns-day.today:not(.active) { border-color:rgba(255,77,141,.55); }
.ns-plan-when { font-size:13px; font-weight:800; color:var(--dim); text-align:center; margin:14px 0 2px; letter-spacing:.02em; }
.ns-lead { font-size:14px; color:var(--dim); font-weight:600; line-height:1.5; margin:2px 0 16px; }
.ns-input-wrap { position:relative; }
.ns-input-ico { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--dim); }
.ns-input { width:100%; background:var(--surf); border:1px solid var(--line); border-radius:14px; padding:14px 14px 14px 42px;
  font-size:15px; color:var(--text); outline:none; transition:border-color .15s; }
.ns-input:focus { border-color:rgba(255,77,141,.55); }
.ns-input::placeholder { color:rgba(86,96,116,.55); }
.ns-chips { display:flex; flex-wrap:wrap; gap:8px; margin:14px 0; }
.ns-chip { background:var(--surf); border:1px solid var(--line); border-radius:12px; padding:9px 13px; font-size:13px; font-weight:700;
  display:flex; align-items:center; gap:6px; transition:transform .15s; }
.ns-chip:active { transform:scale(.94); }
.ns-chip.on { border-color:#2CE6C0; color:#2CE6C0; background:rgba(44,230,192,.08); }
.ns-feel-result { margin-top:8px; }
.ns-feel-head { font-size:18px; font-weight:800; margin-bottom:12px; }
.ns-tip { display:flex; gap:9px; background:var(--surf); border:1px solid var(--line); border-radius:14px; padding:13px 14px;
  font-size:13.5px; line-height:1.55; font-weight:500; color:#cfd6e4; }
.ns-sources-label { font-size:11.5px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--dim); margin:20px 2px 10px; }
.ns-source { display:flex; align-items:center; gap:11px; background:var(--surf); border:1px solid var(--line); border-radius:13px; padding:10px 12px; margin-bottom:8px; }
.ns-source-val { font-size:13px; font-weight:800; font-family:ui-monospace,monospace; margin-left:auto; }
.ns-addpill { background:var(--surf2); border:1px solid var(--line); border-radius:10px; padding:7px 11px; font-size:12px; font-weight:800;
  color:#2CE6C0; display:flex; align-items:center; gap:4px; flex-shrink:0; transition:transform .15s; }
.ns-addpill:active { transform:scale(.9); }
.ns-empty { font-size:13.5px; color:var(--dim); font-weight:600; line-height:1.5; padding:16px; text-align:center;
  background:var(--surf); border:1px solid var(--line); border-radius:14px; }
.ns-why { font-size:14px; line-height:1.55; font-weight:500; color:#cfd6e4; margin:0 0 14px; }
.ns-nutgrid { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:18px; }
.ns-nutchip { background:var(--surf); border:1px solid var(--line); border-radius:11px; padding:8px 11px; font-size:12.5px; font-weight:700;
  display:flex; align-items:center; gap:6px; transition:transform .15s; }
.ns-nutchip:active { transform:scale(.94); }
.ns-learn-title { font-size:22px; font-weight:800; letter-spacing:-0.02em; margin-bottom:10px; }
.ns-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; z-index:40;
  display:grid; grid-template-columns:repeat(4,1fr); padding:8px 12px calc(8px + env(safe-area-inset-bottom));
  background:linear-gradient(#0a0e16cc,#0a0e16); backdrop-filter:blur(14px); border-top:1px solid var(--line); }
.ns-navbtn { background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0;
  color:var(--dim); font-size:10.5px; font-weight:700; transition:transform .15s; }
.ns-navbtn.on { color:#FF4D8D; }
.ns-navbtn.on svg { filter:drop-shadow(0 0 6px rgba(255,77,141,.5)); }
.ns-navbtn:active { transform:scale(.9); }
.ns-backdrop { position:fixed; inset:0; z-index:50; background:rgba(4,6,11,.66); backdrop-filter:blur(3px);
  display:flex; align-items:flex-end; justify-content:center; animation:nsBd .2s ease; }
@keyframes nsBd { from{opacity:0} to{opacity:1} }
.ns-sheet { width:100%; max-width:480px; max-height:88vh; background:#10151F; border:1px solid var(--line); border-bottom:none;
  border-radius:24px 24px 0 0; display:flex; flex-direction:column; animation:nsUp .32s cubic-bezier(.2,.9,.2,1); overflow:hidden; }
@keyframes nsUp { from{transform:translateY(100%)} to{transform:none} }
.ns-sheet-grip { width:38px; height:4px; background:rgba(51,64,84,.4); border-radius:10px; margin:9px auto 4px; flex-shrink:0; }
.ns-sheet-head { display:flex; align-items:center; justify-content:space-between; padding:6px 18px 12px; flex-shrink:0; }
.ns-sheet-head h3 { margin:0; font-size:19px; font-weight:800; letter-spacing:-0.02em; }
.ns-sheet-body { overflow-y:auto; padding:0 18px 22px; -webkit-overflow-scrolling:touch; }
.ns-seg { display:flex; gap:5px; background:var(--surf); border:1px solid var(--line); border-radius:12px; padding:4px; margin-bottom:14px; }
.ns-seg.wrap { flex-wrap:wrap; }
.ns-seg-btn { flex:1; background:none; border:none; border-radius:9px; padding:9px 6px; font-size:12.5px; font-weight:700; color:var(--dim); white-space:nowrap; transition:color .15s; }
.ns-seg.wrap .ns-seg-btn { flex:1 1 calc(50% - 5px); }
.ns-seg-btn.on { background:var(--surf2); color:var(--text); box-shadow:0 1px 6px rgba(0,0,0,.4); }
.ns-addlist { display:flex; flex-direction:column; }
.ns-cat { font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); margin:14px 2px 8px; }
.ns-addrow { display:flex; align-items:center; gap:11px; background:var(--surf); border:1px solid var(--line); border-radius:13px;
  padding:10px 12px; margin-bottom:7px; text-align:left; transition:transform .12s; }
.ns-addrow:active { transform:scale(.98); border-color:rgba(44,230,192,.55); }
.ns-addrow-act { margin-left:auto; color:var(--dim); flex-shrink:0; display:grid; place-items:center; width:24px; }
.ns-done { width:100%; background:linear-gradient(120deg,#FF4D8D,#d63a73); border:none; border-radius:14px; padding:15px;
  font-size:15px; font-weight:800; color:#fff; margin-top:16px; transition:transform .15s; box-shadow:0 4px 18px rgba(255,77,141,.2); }
.ns-done:active { transform:scale(.97); }
.ns-flabel { display:block; font-size:12.5px; font-weight:700; color:var(--dim); margin:16px 2px 8px; }
.ns-finput { width:100%; background:var(--surf); border:1px solid var(--line); border-radius:12px; padding:13px 14px; font-size:15px;
  color:var(--text); outline:none; transition:border-color .15s; }
.ns-finput:focus { border-color:rgba(255,77,141,.55); }
.ns-finput::placeholder { color:rgba(86,96,116,.55); }
.ns-frow { display:flex; gap:10px; }
.ns-target-preview { background:linear-gradient(160deg,#161d2b,#131925); border:1px solid var(--line); border-radius:16px; padding:16px; margin-top:22px; }
.ns-tp-title { font-size:12px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--dim); margin-bottom:12px; }
.ns-tp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px 8px; }
.ns-tp-grid div { display:flex; flex-direction:column; gap:2px; }
.ns-tp-grid b { font-size:18px; font-weight:800; font-family:ui-monospace,monospace; letter-spacing:-0.02em; }
.ns-tp-grid span { font-size:11px; color:var(--dim); font-weight:600; }
.ns-tp-note { font-size:11.5px; color:var(--dim); font-weight:500; line-height:1.5; margin-top:14px; }
.ns-reset { width:100%; background:none; border:1px solid #3a2630; border-radius:12px; padding:12px; font-size:13px; font-weight:700;
  color:#FF6B6B; display:flex; align-items:center; justify-content:center; gap:6px; margin-top:10px; }
.ns-reset-confirm { background:#1e1418; border:1px solid #4a2730; border-radius:12px; padding:14px; margin-top:10px; text-align:center; }
.ns-reset-confirm > span { font-size:13.5px; font-weight:700; color:#FF6B6B; }
.ns-reset-confirm > div { display:flex; gap:8px; margin-top:12px; }
.ns-reset-no { flex:1; background:var(--surf2); border:1px solid var(--line); border-radius:10px; padding:11px; font-weight:700; font-size:13px; }
.ns-reset-yes { flex:1; background:#FF6B6B; border:none; border-radius:10px; padding:11px; font-weight:800; font-size:13px; color:#fff; }
.ns-toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:60; background:#1B2230; border:1px solid var(--line);
  color:var(--text); font-size:13.5px; font-weight:700; padding:12px 18px; border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,.5);
  animation:nsToast .25s ease; white-space:nowrap; }
@keyframes nsToast { from{opacity:0;transform:translate(-50%,8px)} to{opacity:1;transform:translate(-50%,0)} }
@media (prefers-reduced-motion:reduce) { *{animation-duration:.01ms!important;transition-duration:.01ms!important} }

.ns-scanbtn { width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:linear-gradient(120deg,#1c2740,#1a2336);
  border:1px solid #34507a; color:#6EE7FF; border-radius:13px; padding:13px; font-size:14px; font-weight:800; margin-bottom:12px; transition:transform .15s; }
.ns-scanbtn:active { transform:scale(.97); }
.ns-loading { display:flex; align-items:center; justify-content:center; gap:9px; padding:16px; font-size:13px; font-weight:600; color:var(--dim); }
.ns-spin { width:15px; height:15px; border-radius:50%; border:2px solid #2a3342; border-top-color:#FF4D8D; display:inline-block; animation:nsSpin .7s linear infinite; }
@keyframes nsSpin { to { transform:rotate(360deg); } }
.ns-reader { width:100%; aspect-ratio:4/3; background:#05080f; border:1px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:12px; position:relative; }
.ns-reader video { width:100% !important; height:100% !important; object-fit:cover; display:block; }
.ns-reader img { display:none; }
.ns-scan-status { font-size:13px; color:var(--dim); font-weight:600; text-align:center; margin-bottom:6px; min-height:18px; }
.ns-lookup { background:var(--surf2); border:1px solid var(--line); border-radius:12px; padding:0 16px; font-size:13px; font-weight:800; color:#6EE7FF; white-space:nowrap; }
.ns-lookup:disabled { opacity:.4; }

.ns-group-label { font-size:11px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:#9aa6bd; margin:18px 2px 11px; }
.ns-bars { margin-bottom:2px; }

/* v3-polish */
.ns-add-actions { display:flex; gap:8px; margin-bottom:12px; }
.ns-add-actions .ns-scanbtn { flex:1; margin-bottom:0; }
.ns-scanbtn.alt { color:#2CE6C0; border-color:#1f4a3a; background:linear-gradient(120deg,#16241f,#13201b); }
.ns-macro-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.ns-macro-grid > div { display:flex; flex-direction:column; gap:5px; }
.ns-macro-grid > div:first-child { grid-column:1 / -1; }
.ns-macro-grid span { font-size:11.5px; font-weight:700; color:var(--dim); }
.ns-collapse { width:100%; display:flex; align-items:center; justify-content:space-between; background:none; border:none; padding:0; margin:24px 0 6px; }
.ns-collapse-right { display:flex; align-items:center; gap:9px; }
.ns-collapse-count { font-size:11px; font-weight:800; color:#FF9F45; background:rgba(255,159,69,.13); padding:3px 9px; border-radius:20px; }
.ns-chev { color:var(--dim); display:grid; place-items:center; transition:transform .25s ease; }
.ns-chev.open { transform:rotate(90deg); }
.ns-app { background:radial-gradient(120% 60% at 50% -12%, #18223600 0%, #0A0E16 58%), radial-gradient(90% 45% at 102% -2%, #1b1533 0%, #0A0E1600 55%), #090c13; }
.ns-misscard { background:linear-gradient(165deg,#171e2c,#131825); box-shadow:0 2px 10px rgba(0,0,0,.2); }
.ns-meal, .ns-water { background:linear-gradient(165deg,#151b28,#121722); box-shadow:0 2px 10px rgba(0,0,0,.18); }
.ns-section-label { color:#94a2ba; }
.ns-nav { background:linear-gradient(#0a0e16d9,#0a0e16); }
.ns-navbtn { border-radius:12px; padding:7px 0 4px; position:relative; }
.ns-navbtn.on::before { content:""; position:absolute; top:-8px; left:50%; transform:translateX(-50%); width:24px; height:3px; border-radius:3px; background:#FF4D8D; box-shadow:0 0 9px #FF4D8D; }
.ns-addrow:active, .ns-misscard:active, .ns-chip:active, .ns-seg-btn:active, .ns-scanbtn:active { transform:scale(.97); }
.ns-iconbtn:active { transform:scale(.9) rotate(-6deg); }
input, button { -webkit-tap-highlight-color:transparent; }
.ns-top { padding-top:calc(14px + env(safe-area-inset-top)); }

/* v4-scanner */
.ns-bigscan { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; background:linear-gradient(120deg,#FF4D8D,#d63a73);
  border:none; color:#fff; border-radius:16px; padding:18px; font-size:16px; font-weight:800; margin-bottom:10px; box-shadow:0 6px 20px rgba(255,77,141,.28); transition:transform .15s; }
.ns-bigscan:active { transform:scale(.97); }
.ns-bigscan:disabled { opacity:.6; }
.ns-customcta { width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:linear-gradient(120deg,#16241f,#13201b);
  border:1px solid #1f4a3a; color:#2CE6C0; border-radius:14px; padding:14px; font-size:14.5px; font-weight:800; margin-top:18px; transition:transform .15s; }
.ns-customcta:active { transform:scale(.97); }

const OFF_FIELDS = "code,product_name,brands,nutriments,serving_size,quantity,allergens_tags,ingredients_analysis_tags";
const _offCache = {};
const onum = v => {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
};
function offToFood(p) {
  if (!p) return null;
  const n = p.nutriments || {};
  const kcal = n["energy-kcal_100g"] != null ? onum(n["energy-kcal_100g"]) : n["energy_100g"] ? onum(n["energy_100g"]) / 4.184 : 0;
  const nm = (p.product_name || "Unknown product").trim();
  const brand = (p.brands || "").split(",")[0].trim();
  const at = p.allergens_tags || [];
  const ia = p.ingredients_analysis_tags || [];
  return {
    id: "off:" + (p.code || nm),
    emoji: "🛒",
    name: brand ? nm + " · " + brand : nm,
    cat: "Search results",
    serving: "100 g",
    per: {
      calories: kcal,
      protein: onum(n.proteins_100g),
      carbs: onum(n.carbohydrates_100g),
      fat: onum(n.fat_100g),
      fiber: onum(n.fiber_100g),
      vitC: onum(n["vitamin-c_100g"]) * 1000,
      vitD: onum(n["vitamin-d_100g"]) * 1000000,
      calcium: onum(n.calcium_100g) * 1000,
      iron: onum(n.iron_100g) * 1000,
      magnesium: onum(n.magnesium_100g) * 1000,
      potassium: onum(n.potassium_100g) * 1000,
      zinc: onum(n.zinc_100g) * 1000,
      omega3: onum(n["omega-3-fat_100g"]),
      b12: onum(n["vitamin-b12_100g"]) * 1000000,
      folate: onum(n["folates_100g"] || n["vitamin-b9_100g"]) * 1000000,
      vitA: onum(n["vitamin-a_100g"]) * 1000000,
      vitE: onum(n["vitamin-e_100g"]) * 1000,
      vitK: onum(n["vitamin-k_100g"]) * 1000000,
      b1: onum(n["vitamin-b1_100g"]) * 1000,
      b2: onum(n["vitamin-b2_100g"]) * 1000,
      b3: onum(n["vitamin-pp_100g"]) * 1000,
      b5: onum(n["pantothenic-acid_100g"]) * 1000,
      b6: onum(n["vitamin-b6_100g"]) * 1000,
      choline: onum(n["choline_100g"]) * 1000,
      phosphorus: onum(n["phosphorus_100g"]) * 1000,
      copper: onum(n["copper_100g"]) * 1000,
      manganese: onum(n["manganese_100g"]) * 1000,
      selenium: onum(n["selenium_100g"]) * 1000000,
      iodine: onum(n["iodine_100g"]) * 1000000
    },
    tags: {
      dairy: at.includes("en:milk"),
      gluten: at.includes("en:gluten"),
      nuts: at.includes("en:nuts") || at.includes("en:peanuts"),
      fish: at.includes("en:fish") || at.includes("en:crustaceans") || at.includes("en:molluscs"),
      egg: at.includes("en:eggs"),
      meat: ia.includes("en:non-vegetarian")
    }
  };
}
async function offSearch(term, signal) {
  const ck = "s:" + term.toLowerCase();
  if (_offCache[ck]) return _offCache[ck];
  const url = "https://world.openfoodfacts.org/cgi/search.pl?search_terms=" + encodeURIComponent(term) + "&search_simple=1&action=process&json=1&page_size=40&fields=" + OFF_FIELDS;
  const res = await fetch(url, {
    signal
  });
  const data = await res.json();
  const foods = (data.products || []).filter(p => p.product_name && p.product_name.trim() && p.nutriments).map(offToFood).filter(f => f && f.per.calories > 0);
  _offCache[ck] = foods;
  return foods;
}
async function offByBarcode(code, signal) {
  const url = "https://world.openfoodfacts.org/api/v2/product/" + encodeURIComponent(code) + ".json?fields=" + OFF_FIELDS;
  const res = await fetch(url, {
    signal
  });
  const data = await res.json();
  if (data && (data.status === 1 || data.product)) return offToFood(data.product);
  return null;
}
